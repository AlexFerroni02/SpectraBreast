experiment_name: "HybridMAE Pre-training"
author: "AI Assistant"

dataset:
  name: "PreTrain"
  path: "data/PreTrain/SUPER_PRETRAIN_500pt.mat"
  x_key: "X"
  # No Y_key needed for self-supervised learning
  batch_size: 128

model:
  architecture: "HybridMAE"
  input_length: 500
  n_classes: 2         # Dummy value, not used in pre-training
  d_model: 64          # Embedding dimension for CNN and Transformer
  nhead: 4             # Number of attention heads (aligned with fine-tuning)
  num_layers: 2        # Number of Transformer encoder layers (aligned with fine-tuning)
  mask_ratio: 0.75     # Fraction of CNN patches to mask

training:
  optimizer: "AdamW"
  learning_rate: 0.001
  weight_decay: 0.05
  epochs: 50
  patience: 10
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 50

split:
  seed: 42
  holdout:
    test_size: 0.2
    val_size_of_temp: 0.25  # 20% test, 20% val, 60% train
