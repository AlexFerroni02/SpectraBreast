experiment_name: "exp_03_cnn_optuna_final"
dataset:
  name: "IBD"
  path: "data/IBD/Processed/IBD_Dataset_500pt.mat"
  batch_size: 32

split:
  scheme: "kfold"
  n_splits: 5
  val_size: 0.20
  seed: 42

model:
  architecture: "RamanCNN"
  input_length: 500
  n_classes: 2
  num_layers: 4
  base_filters: 64
  kernel_size: 7
  dropout: 0.4206036925137989

training:
  epochs: 100
  learning_rate: 7.684803943636052e-05
  weight_decay: 0.05110920473821017
  patience: 20
  scheduler_patience: 8
  scheduler_factor: 0.5844109197095921
  pos_weight_multiplier: 2.5869746496000103
