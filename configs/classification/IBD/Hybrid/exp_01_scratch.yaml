experiment_name: "Hybrid CNN-Transformer IBD Scratch"
author: "Tu"

dataset:
  name: "IBD"
  path: "data/IBD/Processed/IBD_Dataset_500pt.mat"
  batch_size: 32

model:
  architecture: "HybridCNNTransformer"
  input_length: 500
  n_classes: 2
  d_model: 64
  nhead: 4
  num_layers: 2
  dropout: 0.1

# Nessun blocco pretrain! Il modello partirà da pesi inizializzati casualmente.

training:
  epochs: 150
  learning_rate: 0.001
  weight_decay: 0.01
  patience: 30
  scheduler_patience: 10
  scheduler_factor: 0.5
  pos_weight_multiplier: 1.0
  optimizer: "AdamW"

split:
  scheme: "kfold"
  n_splits: 5
  val_size: 0.20
  seed: 42
