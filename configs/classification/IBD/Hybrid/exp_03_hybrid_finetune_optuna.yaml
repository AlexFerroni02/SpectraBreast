experiment_name: "exp_03_hybrid_finetune_optuna"
author: "AI Assistant"

dataset:
  name: "IBD"
  path: "data/IBD/Processed/IBD_Dataset_500pt.mat"
  batch_size: 32

model:
  architecture: "HybridCNNTransformer"
  input_length: 500
  n_classes: 2
  d_model: 64          # Must match pretraining
  nhead: 4             # Must match pretraining
  num_layers: 2        # Must match pretraining
  dropout: 0.1

pretrain:
  pretrained_path: "experiments/pretraining/exp_03_hybrid_mae_optimal/best_pretrained_model.pth"

training:
  mode: "finetune"
  head_attr: "classifier"
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.01
  patience: 20
  scheduler_patience: 8
  scheduler_factor: 0.5
  pos_weight_multiplier: 1.0
  optimizer: "AdamW"

split:
  scheme: "kfold"
  n_splits: 5
  val_size: 0.20
  seed: 42
