experiment_name: "Hybrid CNN-Transformer IBD Fine-tuning"
author: "AI Assistant"

dataset:
  name: "IBD"
  path: "data/IBD/Processed/IBD_Dataset_500pt.mat"
  batch_size: 32
  # x_key: "X_processed"
  # y_key: "labels_binary"

model:
  architecture: "HybridCNNTransformer"
  input_length: 500
  n_classes: 2
  d_model: 64          # Must match the pretraining config
  nhead: 4             # Must match the pretraining config
  num_layers: 2        # Must match the pretraining config

# Pre-training checkpoint to load
pretrain:
  # Set this to the .pth file saved by the HybridMAE pre-training
  # After running pre-training, update this path:
  pretrained_path: "experiments/pretraining/exp_02_hybrid_mae_baseline/best_pretrained_model.pth"

training:
  # mode: "finetune" means LP warm-up, then unfreeze everything with lower LR
  mode: "finetune"

  # Stage 1: Linear Probe warm-up (encoder frozen)
  lp_epochs: 15
  lr_lp: 0.001

  # Stage 2: Full fine-tuning
  ft_epochs: 100
  lr_ft: 0.0001

  weight_decay: 0.0001
  patience: 20
  scheduler_patience: 7
  grad_clip: 1.0

  # Name of the classification head attribute in HybridCNNTransformer
  head_attr: "classifier"

  run_holdout: true

split:
  seed: 42
  scheme: "kfold"
  holdout:
    test_size: 0.20
    val_size_of_temp: 0.50
  kfold:
    n_splits: 5
    val_size: 0.20
