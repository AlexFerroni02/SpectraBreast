experiment_name: "exp_01_cnn_lomo"

dataset:
  name: "Trophy"
  path: "/content/drive/Othercomputers/Il mio laptop/SpectraBreast/data/Trophy/TROPHY_500pt_Labeled.mat"
  batch_size: 32
  # Optional overrides if your .mat variable names differ
  x_key: "X_trophy_500"
  y_key: "Ytrophy_binary"
  group_key: "MappeID"

model:
  architecture: "RamanCNN"
  input_length: 500
  n_classes: 2

training:
  epochs: 200
  learning_rate: 0.0005
  weight_decay: 0.001
  patience: 15

split:
  scheme: "lomo"   # holdout | lomo
  seed: 42
  holdout:
    test_size: 0.30
    val_size_of_temp: 0.50
  lomo:
    val_size: 0.20
    skip_if_single_class_test: true
